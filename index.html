<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Portal Maestro</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: #f4f8ff;
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .welcome {
      text-align: center;
      background: #fff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.1);
    }

    .welcome img {
      max-width: 180px; /* tamanho do logo */
      margin-bottom: 20px;
    }

    .welcome h1 {
      color: #004080;
      margin: 0;
      font-size: 26px;
    }

    .welcome p {
      color: #555;
      font-size: 16px;
      margin-top: 10px;
    }

    .welcome button {
      margin-top: 25px;
      padding: 12px 24px;
      border: none;
      border-radius: 6px;
      background: #0066cc;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .welcome button:hover {
      background: #004080;
    }
  </style>
</head>
<body>
  <div class="welcome">
    <!-- Logo da empresa -->
    <img src="img/src/logo.png" alt="Logo Maestro">

    <!-- Título e subtítulo -->
    <h1>Bem-vindo ao Maestro Reembolso</h1>
    <p>Gestão Inteligente & Financeira</p>

    <!-- Botão para acessar login -->
    <button onclick="window.location.href='login.html'">Entrar no Sistema</button>
  </div>
</body>
</html>
