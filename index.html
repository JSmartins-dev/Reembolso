<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Portal Maestro</title>
  <link rel="stylesheet" href="azure.css">
  <style>
    .inicio-container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 80vh;
      flex-direction: column;
      text-align: center;
    }
    .inicio-container h1 {
      color: #004080;
      margin-bottom: 20px;
    }
    .inicio-container p {
      color: #555;
      margin-bottom: 30px;
    }
    .btn-entrar {
      background-color: #0078d4;
      color: #fff;
      border: none;
      padding: 12px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      transition: background-color 0.3s ease;
    }
    .btn-entrar:hover {
      background-color: #005a9e;
    }
  </style>
</head>
<body>
  <main class="inicio-container">
    <h1>Bem-vindo ao Portal Maestro</h1>
    <p>Acesse o sistema para continuar</p>
    <!-- Botão que leva para login.html -->
    <button class="btn-entrar" onclick="window.location.href='login.html'">Entrar</button>
  </main>
</body>
</html>
