<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Financeiro (Nuvem)</title>
    <style>
        :root {
            --primary: #004080; --secondary: #0066cc; --success: #28a745;
            --danger: #dc3545; --light: #f4f6f9; --white: #ffffff; --warning: #ffc107;
        }

        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--light); margin: 0; padding: 0; }
        
        #alerta-notificacao {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: var(--warning); color: #000; padding: 15px 30px;
            border-radius: 0 0 10px 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 9999; display: flex; align-items: center; gap: 15px;
            font-weight: bold; transition: top 0.5s ease-in-out;
        }

        #alerta-notificacao.show { top: 0; }

        .btn-atualizar { background: #000; color: #fff; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }

        header { background: var(--primary); color: #fff; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .container { padding: 20px; max-width: 1200px; margin: auto; }
        h2 { color: var(--primary); border-left: 5px solid var(--secondary); padding-left: 10px; margin-top: 30px; margin-bottom: 15px; }

        .cards-resumo { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card-financeiro { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); text-align: center; }
        .card-financeiro h3 { margin: 0 0 10px 0; font-size: 13px; color: #666; text-transform: uppercase; }
        .card-financeiro p { font-size: 22px; font-weight: bold; margin: 0; color: var(--secondary); }

        .grid-solicitacoes { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .block-card { background: var(--white); border-radius: 10px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); border-top: 4px solid var(--secondary); position: relative; transition: transform 0.2s; }
        .block-card:hover { transform: translateY(-3px); }
        .block-card h4 { margin: 0 0 10px 0; color: var(--primary); font-size: 18px; display: flex; justify-content: space-between; }
        .block-card p { margin: 5px 0; font-size: 14px; color: #444; }
        .block-card .valor { font-size: 18px; font-weight: bold; color: var(--primary); margin: 10px 0; }
        .block-card .status { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; margin-bottom: 10px; }

        .btn { padding: 8px 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 14px; }
        .btn-approve { background: var(--success); color: white; }
        .btn-reject { background: var(--danger); color: white; }
        .btn-primary { background: var(--secondary); color: white; }
        
        .status-pendente { background: #fff3cd; color: #856404; }
        .status-aprovado { background: #d4edda; color: #155724; }
        .status-reprovado { background: #f8d7da; color: #721c24; }
        
        .acoes-container { display: flex; gap: 8px; }
    </style>
</head>
<body>

<div id="alerta-notificacao">
    <span>🔔 Nova solicitação recebida via nuvem!</span>
    <button class="btn-atualizar" onclick="recarregarNotificacao()">OK</button>
</div>

<audio id="som-notificacao" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

<header>
    <a href="#" class="logo">Painel Administrativo Maestro</a>
    <button class="btn" style="background: transparent; border: 1px solid white; color: white;" onclick="logout()">Sair</button>
</header>

<div class="container">
    <div class="cards-resumo">
        <div class="card-financeiro"><h3>Saldo Inicial</h3><p id="saldoInicialDisplay">R$ 0,00</p></div>
        <div class="card-financeiro"><h3>Total Reembolsos</h3><p id="totalReembolsos" style="color: var(--danger);">R$ 0,00</p></div>
        <div class="card-financeiro"><h3>Total Aportes</h3><p id="totalAportes" style="color: var(--success);">R$ 0,00</p></div>
        <div class="card-financeiro"><h3>Saldo em Caixa</h3><p id="saldoAtualDisplay">R$ 0,00</p></div>
    </div>

    <button class="btn" id="btnToggle" style="background: #6c757d; color: white; width: 100%; margin-bottom: 20px;" onclick="toggleHistorico()">Ocultar Histórico</button>

    <h2>Reembolsos</h2>
    <div id="gridReembolsos" class="grid-solicitacoes"></div>

    <h2>Aportes</h2>
    <div id="gridAportes" class="grid-solicitacoes"></div>
</div>

<script type="module">
    // --- CONFIGURAÇÃO FIREBASE ---
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "SUA_API_KEY",
        authDomain: "SEU_PROJETO.firebaseapp.com",
        databaseURL: "https://reembolso-7691c-default-rtdb.firebaseio.com/",
        projectId: "SEU_PROJETO",
        storageBucket: "SEU_PROJETO.appspot.com",
        messagingSenderId: "ID",
        appId: "ID_APP"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const solicitacoesRef = ref(db, 'solicitacoes');

    // --- VARIÁVEIS GLOBAIS ---
    let listaSolicitacoes = [];
    let mostrarApenasPendentes = false;
    let primeiraCarga = true;

    // --- ESCUTAR MUDANÇAS NO BANCO (TEMPO REAL) ---
    onValue(solicitacoesRef, (snapshot) => {
        const dados = snapshot.val();
        // Converte objeto do Firebase para Array
        listaSolicitacoes = dados ? Object.keys(dados).map(key => ({ id: key, ...dados[key] })) : [];
        
        if (!primeiraCarga) {
            document.getElementById("alerta-notificacao").classList.add("show");
            document.getElementById("som-notificacao").play();
        }
        
        primeiraCarga = false;
        renderizarTudo();
    });

    function renderizarTudo() {
        const gridR = document.getElementById("gridReembolsos");
        const gridA = document.getElementById("gridAportes");
        gridR.innerHTML = ""; gridA.innerHTML = "";

        let somaR = 0; let somaA = 0;

        listaSolicitacoes.forEach(s => {
            const valorNum = parseFloat(s.valor.toString().replace(',','.')) || 0;
            
            // Cálculos
            if (s.status === "Aprovado") {
                if (s.tipo === "Reembolso") somaR += valorNum;
                if (s.tipo === "Aporte") somaA += valorNum;
            }

            // Filtro de Histórico
            if (mostrarApenasPendentes && s.status !== "Pendente") return;

            const card = `
                <div class="block-card">
                    <span class="status status-${s.status.toLowerCase()}">${s.status}</span>
                    <h4>${s.solicitante || s.nome}</h4>
                    <p><strong>Data:</strong> ${s.data || '-'}</p>
                    <p><strong>Descrição:</strong> ${s.item || s.descricao || '-'}</p>
                    <div class="valor">R$ ${valorNum.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</div>
                    <div style="display:flex; justify-content: space-between; margin-top: 15px; border-top: 1px solid #eee; padding-top:10px;">
                         <button class="btn btn-primary" onclick="window.verDetalhes('${s.id}')">Detalhes</button>
                         ${s.status === 'Pendente' ? `
                            <div class="acoes-container">
                                <button class="btn btn-approve" onclick="window.atualizarStatus('${s.id}', 'Aprovado')">✓</button>
                                <button class="btn btn-reject" onclick="window.atualizarStatus('${s.id}', 'Reprovado')">✕</button>
                            </div>
                         ` : '<small>Processado</small>'}
                    </div>
                </div>
            `;

            if (s.tipo === "Reembolso") gridR.innerHTML += card;
            else gridA.innerHTML += card;
        });

        // Atualiza Cards de Resumo
        const saldoIni = parseFloat(localStorage.getItem("saldoInicial")) || 0;
        document.getElementById("saldoInicialDisplay").innerText = "R$ " + saldoIni.toLocaleString('pt-BR');
        document.getElementById("totalReembolsos").innerText = "- R$ " + somaR.toLocaleString('pt-BR');
        document.getElementById("totalAportes").innerText = "+ R$ " + somaA.toLocaleString('pt-BR');
        document.getElementById("saldoAtualDisplay").innerText = "R$ " + (saldoIni + somaA - somaR).toLocaleString('pt-BR');
    }

    // Funções Globais (Para os botões do HTML funcionarem)
    window.atualizarStatus = (id, novoStatus) => {
        if(confirm(`Confirmar ${novoStatus}?`)) {
            update(ref(db, 'solicitacoes/' + id), { status: novoStatus });
        }
    };

    window.toggleHistorico = () => {
        mostrarApenasPendentes = !mostrarApenasPendentes;
        document.getElementById("btnToggle").innerText = mostrarApenasPendentes ? "Mostrar Histórico" : "Ocultar Histórico";
        renderizarTudo();
    };

    window.recarregarNotificacao = () => {
        document.getElementById("alerta-notificacao").classList.remove("show");
    };

    window.logout = () => {
        localStorage.removeItem("usuarioLogado");
        window.location.href = "login.html";
    };
    
    // Função de detalhes (simplificada para o exemplo)
    window.verDetalhes = (id) => {
        const s = listaSolicitacoes.find(x => x.id === id);
        alert(`Solicitante: ${s.solicitante}\nValor: R$ ${s.valor}\nDescrição: ${s.item || s.descricao}`);
    };

</script>
</body>
</html>
