<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Maestro - Login</title>
    <style>
        /* Estilo inspirado no Azure/Modern UI */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #e6f0ff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-panel {
            background: #fff;
            display: flex;
            flex-direction: row;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 700px;
            min-height: 350px;
        }

        /* Lado Esquerdo - Branding */
        .login-left {
            flex: 1;
            background: #004080;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
        }

        .login-left h1 {
            margin: 0;
            font-size: 28px;
            letter-spacing: 1px;
        }

        .login-left p {
            font-size: 14px;
            opacity: 0.8;
            margin-top: 10px;
        }

        /* Lado Direito - Form */
        .login-right {
            flex: 1.2;
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .login-right h2 {
            margin-bottom: 25px;
            color: #333;
            font-size: 20px;
        }

        .login-right label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
            font-size: 14px;
        }

        .login-right input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            transition: border 0.3s;
        }

        .login-right input:focus {
            border-color: #0066cc;
            outline: none;
        }

        .login-right button {
            width: 100%;
            padding: 12px;
            background: #0066cc;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .login-right button:hover {
            background: #005bb5;
        }

        /* Responsividade */
        @media (max-width: 600px) {
            .login-panel {
                flex-direction: column;
                width: 90%;
            }
            .login-left { padding: 20px; }
        }
    </style>
</head>
<body>

<div class="login-panel">
    <div class="login-left">
        <h1> Maestro</h1>
        <p>Reembolso</p>
    </div>
    
    <div class="login-right">
        <h2>Acesse sua conta</h2>
        <form id="loginForm">
            <label for="usuario">Usuário</label>
            <input type="text" id="usuario" placeholder="Digite seu usuário" required>

            <label for="senha">Senha</label>
            <input type="password" id="senha" placeholder="••••••••" required>

            <button type="submit">Entrar</button>
        </form>
    </div>
</div>

<script>
    // Banco de dados de usuários simulado
    const baseUsuarios = {
        "admin": { senha: "admin" },
        "financeiro": { senha: "1234" },
        "vinicius": { senha: "abcd" },
        "financeiro.adm": { senha: "adm123" }
    };

    document.getElementById("loginForm").addEventListener("submit", function(event) {
        event.preventDefault();

        const userIn = document.getElementById("usuario").value.trim().toLowerCase();
        const passIn = document.getElementById("senha").value;

        const usuarioEncontrado = baseUsuarios[userIn];

        // Validação de Credenciais
        if (usuarioEncontrado && usuarioEncontrado.senha === passIn) {
            
            // Salva o estado do login
            localStorage.setItem("usuarioLogado", userIn);
            
            // Lógica de Redirecionamento baseada no usuário
            if (userIn === "admin") {
                window.location.href = "painel-admin.html";
            } else if (userIn === "financeiro" || userIn === "financeiro.adm") {
                window.location.href = "financeiro.html";
            } else if (userIn === "vinicius") {
                window.location.href = "vinicius.html";
            } else {
                window.location.href = "minhas-solicitacoes.html";
            }

        } else {
            alert("Usuário ou senha incorretos. Tente novamente.");
        }
    });
</script>

</body>
</html>
